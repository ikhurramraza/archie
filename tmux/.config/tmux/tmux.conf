# ┣━━━━━━━━━━━━━━━━━━━━━━━━━━━━┫ GENERAL SETTINGS ┣━━━━━━━━━━━━━━━━━━━━━━━━━━━┫

# Prefix
set -g prefix C-Space
bind Space send-prefix

# Start window/pane numbering at 1
set -g base-index 1
set -g pane-base-index 1

# Terminal capabilities
set -g default-terminal "tmux-256color"
set -as terminal-features 'xterm*:RGB'

# Extended key reporting (CSI u)
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

set -sg escape-time 0
set -g focus-events on

# Let the terminal handle the clipboard via OSC 52
set -g set-clipboard on
set -g allow-passthrough on
set -as terminal-features 'xterm*:clipboard'

# Status bar and window titles
set -g status off
set -g set-titles on

# Vi-style keys in copy mode and the command prompt
set -g status-keys vi
setw -g mode-keys vi

# Behavior
set -g mouse on
set -g detach-on-destroy off
set -g history-limit 100000

# Silence all bells and activity alerts
set -g visual-bell off
set -g bell-action none
set -g visual-silence off
set -g visual-activity off
setw -g monitor-activity off

# ┣━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┫ KEY BINDINGS ┣━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┫

bind b set status
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

bind c new-window -c "#{pane_current_path}"
bind C command-prompt -p "Window name:" "new-window -c '#{pane_current_path}'; rename-window '%%'"
bind Tab next-window

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind -r J resize-pane -D 1
bind -r K resize-pane -U 1
bind -r H resize-pane -L 1
bind -r L resize-pane -R 1

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind v capture-pane -S - \; \
       save-buffer /tmp/tmux_buffer \; \
       new-window -n "buffer" nvim +$ /tmp/tmux_buffer

bind z clear-history

bind a run-shell "~/.config/tmux/scripts/toggle-quick-window ai claude"
bind A display-popup -E -w 80% -h 80% "~/.config/tmux/scripts/ai-explain-pane"
bind g run-shell "~/.config/tmux/scripts/toggle-quick-window lazygit"
bind j run-shell "~/.config/tmux/scripts/toggle-quick-window joshuto"
bind o run-shell "~/.config/tmux/scripts/toggle-quick-window notie ~/.config/tmux/scripts/notie"

bind S popup -d "#{pane_current_path}" -E -h100% -w100% screen -qR scratch

# ┣━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┫ PLUGINS ┣━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┫

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'dracula/tmux'
set -g @dracula-show-left-icon session
set -g @dracula-border-contrast true
set -g @dracula-show-fahrenheit false
set -g @dracula-day-month true
set -g @dracula-time-format " %R %Z"
set -g @dracula-plugins 'time'
set -g @dracula-time-colors 'cyan dark_gray'

set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-unique enabled
set -g @thumbs-command 'tmux set-buffer -- {} && tmux paste-buffer'
set -g @thumbs-upcase-command 'tmux set-buffer -w -- {}'

set -g @plugin "ikhurramraza/tmux-jumper"
set -g @jumper-popup-height 20
set -g @jumper-popup-y-position 23
set -g @jumper-new-session-script "~/.local/scripts/t"

run '~/.config/tmux/plugins/tpm/tpm'
