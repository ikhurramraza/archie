skip_output:
  - meta
  - summary
  - success
  - execution

pre-commit:
  parallel: true
  commands:
    shfmt:
      files: git diff --name-only --cached zsh tmux/.config/tmux/scripts/ tmux/.local/scripts/ snappy/.local/scripts/
      exclude: ".zshrc"
      run: shfmt -i=2 -d {files}

    stylua:
      files: git diff --name-only --cached *.lua
      run: stylua --config-path stylua/.config/stylua/stylua.toml --check {files}

    snapshot:
      files: git ls-files
      run: make snapshot &>/dev/null && git diff --exit-code snapshot
